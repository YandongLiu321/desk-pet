<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁纸模式 — 柚子·月语</title>
<link rel="stylesheet" href="../shared/styles/base.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: url('../../../assets/backgrounds/we_main.png') center/cover no-repeat, linear-gradient(135deg, var(--color-bg-darkest), var(--color-bg-dark));
    overflow: hidden;
    position: relative;
  }

  .wallpaper-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
  }

  .wallpaper-bg-layer {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(107,92,231,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .wallpaper-char-area {
    width: var(--char-wallpaper-size);
    height: var(--char-wallpaper-size);
    margin-bottom: var(--space-xl);
    cursor: pointer;
  }

  .wallpaper-top-left-group {
    position: absolute;
    top: var(--space-lg);
    left: var(--space-lg);
    display: flex;
    align-items: flex-start;
    gap: var(--space-xl);
    z-index: 10;
  }

  .wallpaper-pomodoro-area {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-sm);
  }

  /* ── Task selection ── */
  .wallpaper-task-select {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(20,20,40,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-lg);
    padding: var(--space-md) var(--space-lg);
    min-width: 320px;
    max-width: 420px;
    max-height: 260px;
    overflow-y: auto;
    backdrop-filter: blur(10px);
  }
  .wallpaper-task-select-title {
    font-size: var(--font-sm);
    color: var(--color-text-muted);
    text-align: center;
    margin-bottom: var(--space-sm);
    letter-spacing: 2px;
  }
  .wallpaper-task-select-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-md);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
    color: var(--color-text-primary);
    font-size: var(--font-sm);
  }
  .wallpaper-task-select-item:hover {
    background: rgba(107,92,231,0.2);
  }
  .wallpaper-task-select-item.selected {
    background: rgba(107,92,231,0.35);
    border: 1px solid rgba(107,92,231,0.5);
  }
  .wallpaper-task-select-item-meta {
    font-size: var(--font-xs);
    color: var(--color-text-muted);
    margin-left: var(--space-sm);
    white-space: nowrap;
  }
  .wallpaper-task-select-item.subtask {
    padding-left: var(--space-xl);
    font-size: var(--font-xs);
    color: var(--color-text-secondary);
  }
  .wallpaper-task-select-item.subtask:hover {
    background: rgba(107,92,231,0.25);
  }
  .wallpaper-task-select-expand {
    font-size: var(--font-xs);
    color: var(--color-text-muted);
    margin-left: auto;
    transition: transform 0.2s;
  }
  .wallpaper-task-select-expand.open {
    transform: rotate(90deg);
  }

  /* ── Selected task badge ── */
  .wallpaper-selected-task {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-xs) var(--space-md);
    background: rgba(107,92,231,0.2);
    border: 1px solid rgba(107,92,231,0.35);
    border-radius: var(--radius-full, 20px);
    font-size: var(--font-sm);
    color: var(--color-text-primary);
    margin-bottom: var(--space-sm);
  }
  .wallpaper-yuzu-activity {
    display: none;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-xs) var(--space-md);
    background: rgba(240,192,96,0.12);
    border: 1px solid rgba(240,192,96,0.25);
    border-radius: var(--radius-full, 20px);
    font-size: var(--font-sm);
    color: var(--color-accent);
    margin-bottom: var(--space-sm);
    animation: yuzuActivityFadeIn 0.5s ease;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @keyframes yuzuActivityFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wallpaper-change-task-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--color-text-muted);
    font-size: var(--font-xs);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .wallpaper-change-task-btn:hover {
    background: rgba(255,255,255,0.2);
    color: var(--color-text-primary);
  }

  .wallpaper-chat-sidebar {
    position: fixed;
    right: 0;
    top: 0;
    width: 320px;
    height: 100%;
    background: var(--color-bg-dark);
    border-left: 1px solid var(--color-bg-light);
    transform: translateX(100%);
    transition: transform var(--transition-normal);
    z-index: 20;
    display: flex;
    flex-direction: column;
  }

  .wallpaper-chat-sidebar.open {
    transform: translateX(0);
  }

  .wallpaper-chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-md);
    border-bottom: 1px solid var(--color-bg-light);
  }

  .wallpaper-chat-header span {
    font-size: var(--font-lg);
    color: var(--color-text-primary);
  }

  .wallpaper-chat-close {
    background: none;
    border: none;
    color: var(--color-text-muted);
    cursor: pointer;
    font-size: var(--font-xl);
  }

  .wallpaper-chat-content {
    flex: 1;
    overflow: hidden;
  }

  .wallpaper-esc-hint {
    position: fixed;
    bottom: var(--space-md);
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--font-xs);
    color: var(--color-text-muted);
    opacity: 0.5;
  }

  .wallpaper-exit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 45;
  }
  .wallpaper-exit-overlay.open { display: block; }

  .wallpaper-exit-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--color-bg-dark);
    border: 1px solid var(--color-bg-light);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    box-shadow: var(--shadow-lg);
    z-index: 50;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  .wallpaper-exit-panel.open { display: block; }

  .wallpaper-exit-panel p {
    color: var(--color-text-primary);
    font-size: var(--font-base);
    margin: 0 0 var(--space-md);
  }

  .wallpaper-exit-panel button {
    margin: var(--space-xs);
    padding: var(--space-sm) var(--space-md);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: var(--font-sm);
  }
  .wallpaper-exit-btn-primary {
    background: var(--color-primary);
    color: #fff;
  }
  .wallpaper-exit-btn-secondary {
    background: var(--color-bg-light);
    color: var(--color-text-primary);
  }

  .wallpaper-exit-progress-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-xs);
    margin: var(--space-sm) 0;
  }
  .wallpaper-exit-progress-label {
    font-size: var(--font-sm);
    color: var(--color-text-secondary);
    white-space: nowrap;
  }
  .wallpaper-exit-progress-input {
    width: 64px;
    background: var(--color-bg-medium);
    border: 1px solid var(--color-bg-light);
    border-radius: var(--radius-sm);
    color: var(--color-text-primary);
    padding: var(--space-xs) var(--space-sm);
    font-size: var(--font-sm);
    text-align: center;
    box-sizing: border-box;
  }
  .wallpaper-exit-progress-input::-webkit-inner-spin-button,
  .wallpaper-exit-progress-input::-webkit-outer-spin-button {
    opacity: 1;
  }
  .wallpaper-exit-progress-unit {
    font-size: var(--font-sm);
    color: var(--color-text-secondary);
  }

  /* ── Departure overlay ── */
  .wallpaper-departure-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,30,0.7);
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .wallpaper-departure-overlay.show {
    display: flex;
    animation: departureFadeIn 0.4s ease;
  }
  .wallpaper-departure-overlay.fadeout {
    animation: departureFadeOut 0.6s ease forwards;
  }

  .wallpaper-departure-card {
    background: var(--color-bg-dark);
    border: 1px solid rgba(107,92,231,0.3);
    border-radius: var(--radius-lg);
    padding: var(--space-xl) var(--space-xl);
    text-align: center;
    box-shadow: 0 0 60px rgba(107,92,231,0.15);
    max-width: 420px;
    width: 90%;
  }
  .wallpaper-departure-card .departure-user-line {
    font-size: var(--font-lg);
    color: var(--color-text-primary);
    margin-bottom: var(--space-sm);
    line-height: 1.6;
  }
  .wallpaper-departure-card .departure-user-title {
    color: var(--color-primary-light);
    font-weight: 600;
  }
  .wallpaper-departure-card .departure-divider {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin: var(--space-md) auto;
  }
  .wallpaper-departure-card .departure-yuzu-line {
    font-size: var(--font-base);
    color: var(--color-accent);
    margin-bottom: var(--space-sm);
    line-height: 1.6;
  }
  .wallpaper-departure-card .departure-countdown {
    font-size: var(--font-sm);
    color: var(--color-text-muted);
    margin-top: var(--space-md);
    letter-spacing: 2px;
  }

  @keyframes departureFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes departureFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* ── Yuzu halfway bubble ── */
  .wallpaper-yuzu-activity.pulse {
    animation: yuzuPulse 0.5s ease;
    background: rgba(240,192,96,0.22);
    border-color: rgba(240,192,96,0.5);
  }
  @keyframes yuzuPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<video id="wallpaperVideoA" class="wallpaper-video" muted loop playsinline></video>
<video id="wallpaperVideoB" class="wallpaper-video" muted loop playsinline></video>
<canvas id="webglCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>

<div class="wallpaper-bg-layer"></div>

<div class="wallpaper-char-area" id="charArea" title="点击柚子打开对话"></div>

<!-- Task selection area -->
<div class="wallpaper-task-select glass-panel" id="taskSelectArea" style="display:none;">
  <div class="wallpaper-task-select-title">选择任务开始专注</div>
  <div id="taskSelectList"></div>
</div>

<!-- Selected task badge -->
<div class="wallpaper-yuzu-activity" id="yuzuActivityLabel">
  <span id="yuzuActivityText"></span>
</div>
<div class="wallpaper-selected-task" id="selectedTaskBadge" style="display:none;">
  <span id="selectedTaskName"></span>
  <button class="wallpaper-change-task-btn" id="changeTaskBtn">更换</button>
</div>

<div class="wallpaper-top-left-group" id="topLeftGroup" style="display:none;">
  <div class="wallpaper-pomodoro-area" id="pomodoroArea"></div>
  <div id="audioArea"></div>
</div>

<div class="wallpaper-chat-sidebar glass-panel" id="chatSidebar">
  <div class="wallpaper-chat-header">
    <span>柚子·月语</span>
    <button class="wallpaper-chat-close" id="chatCloseBtn">×</button>
  </div>
  <div class="wallpaper-chat-content" id="chatContent"></div>
</div>

<!-- Departure overlay: shows when pomodoro starts -->
<div class="wallpaper-departure-overlay" id="departureOverlay">
  <div class="wallpaper-departure-card">
    <div class="departure-user-line" id="departureUserLine"></div>
    <div class="departure-divider"></div>
    <div class="departure-yuzu-line" id="departureYuzuLine"></div>
    <div class="departure-countdown" id="departureCountdown"></div>
  </div>
</div>

<div class="wallpaper-esc-hint">按 ESC 退出壁纸模式</div>

<div class="wallpaper-exit-overlay" id="exitOverlay"></div>
<div class="wallpaper-exit-panel" id="exitPanel">
  <!-- State 1: inquiry -->
  <div id="exitStateInquiry">
    <p>专注时间结束了~</p>
    <button class="wallpaper-exit-btn-primary" id="exitCompletedBtn">完成了</button>
    <button class="wallpaper-exit-btn-secondary" id="exitNotYetBtn">还没完成</button>
    <button class="wallpaper-exit-btn-secondary" id="exitExtendBtn">再延 25 分钟</button>
  </div>
  <!-- State 2: progress note -->
  <div id="exitStateNote" style="display:none">
    <p>记录一下进度吧~</p>
    <div class="wallpaper-exit-progress-row">
      <label class="wallpaper-exit-progress-label">完成进度</label>
      <input type="number" class="wallpaper-exit-progress-input" id="exitProgressPercentInput" min="0" max="100" step="5" value="0">
      <span class="wallpaper-exit-progress-unit">%</span>
    </div>
    <button class="wallpaper-exit-btn-primary" id="exitProgressSaveBtn">保存并返回</button>
  </div>
</div>

<script src="../../shared/constants.js"></script>
<script src="../shared/ipc-client.js"></script>
<script src="../shared/theme-manager.js"></script>
<script src="../shared/dom-utils.js"></script>
<script src="../shared/character-renderer.js"></script>
<script src="../shared/conversation-panel.js"></script>
<script src="../shared/pomodoro-timer.js"></script>
<script src="../shared/white-noise-control.js"></script>
<script src="../shared/webgl/math.js"></script>
<script src="../shared/webgl/shader-manager.js"></script>
<script src="../shared/webgl/texture-manager.js"></script>
<script src="../shared/webgl/mesh.js"></script>
<script src="../shared/webgl/framebuffer.js"></script>
<script src="../shared/webgl/camera.js"></script>
<script src="../shared/webgl/scene-graph.js"></script>
<script src="../shared/webgl/render-pipeline.js"></script>
<script src="../shared/webgl/renderer.js"></script>
<script>
(() => {
  const { IpcClient, CharacterRenderer, ConversationPanel, PomodoroTimer, WhiteNoiseControl, ThemeManager } = window;
  const { INTENT, MODE } = window;
  const ipc = new IpcClient();
  const themeManager = new ThemeManager();
  themeManager.init(ipc);

  // Listen for settings changes to sync theme across windows
  ipc.onSettingsChanged((settings) => {
    if (settings.theme) themeManager.setTheme(settings.theme);
  });
  // Listen for scene updates from the editor
  ipc.onEditorApply(function(sceneData) {
    console.log("Received scene from editor:", sceneData);
    if (window._webglApplyWeWallpaper) {
      window._webglApplyWeWallpaper(sceneData);
    }
  });

  // ── State ──
  // ── Wallpaper video ──
  const videoA = document.getElementById("wallpaperVideoA");
  const videoB = document.getElementById("wallpaperVideoB");
  // Both videos always display:block so they render frames; only opacity differs.
  // activeVideo is at opacity 1, loadingVideo at opacity 0.
  let activeVideo = videoA;
  let loadingVideo = videoB;
  const MODE_VIDEO = {
    rest:     { day: '../../../assets/wallpapers/rest/休息-日.mp4',     night: '../../../assets/wallpapers/rest/休息-夜.mp4' },
    computer: { day: '../../../assets/wallpapers/computer/电脑.mp4',   night: '../../../assets/wallpapers/computer/电脑.mp4' },
    reading:  { day: '../../../assets/wallpapers/reading/看书-日.mp4',  night: '../../../assets/wallpapers/reading/看书-日.mp4' },
    writing:  { day: '../../../assets/wallpapers/writing/写字-日.mp4',  night: '../../../assets/wallpapers/writing/写字-日.mp4' },
  };
  let currentVideoSrc = null;
  let dayPeriodTimer = null;

  function getDayPeriod() {
    const hour = new Date().getHours();
    return (hour >= 6 && hour < 18) ? 'day' : 'night';
  }

  function getVideoSrc(mode) {
    const variants = MODE_VIDEO[mode];
    if (!variants) return null;
    const period = getDayPeriod();
    return variants[period] || variants.day || variants.night || null;
  }

  // Hide the CSS starry background when a video will cover it, so it doesn't
  // flash through while the video is loading (both elements start at opacity 0).
  var _bodyBgImage = '';
  function _hideBodyBackground() {
    if (!_bodyBgImage) {
      _bodyBgImage = window.getComputedStyle(document.body).backgroundImage;
    }
    document.body.style.backgroundImage = 'none';
  }
  function _showBodyBackground() {
    if (_bodyBgImage) {
      document.body.style.backgroundImage = _bodyBgImage;
    }
  }

  videoA.addEventListener('error', function () {
    videoA.style.opacity = '0';
    // If both videos ended up invisible, restore the CSS background
    if (videoA.style.opacity === '0' && videoB.style.opacity === '0') {
      _showBodyBackground();
    }
  });
  videoB.addEventListener('error', function () {
    videoB.style.opacity = '0';
    if (videoA.style.opacity === '0' && videoB.style.opacity === '0') {
      _showBodyBackground();
    }
  });

  function swapVideos() {
    var temp = activeVideo;
    activeVideo = loadingVideo;
    loadingVideo = temp;
  }

  function finishVideoSwitch() {
    var oldActive = activeVideo;
    activeVideo.style.opacity = '0';
    activeVideo.pause();
    activeVideo.style.zIndex = '0';
    loadingVideo.style.opacity = '1';
    loadingVideo.style.zIndex = '1';
    swapVideos();
    // Defer clearing old video src by one rAF so the compositor doesn't
    // tear down its surface before loadingVideo's first frame is shown.
    requestAnimationFrame(function () { oldActive.src = ''; });
  }

  function switchWallpaperVideo(mode) {
    var src = getVideoSrc(mode);
    if (src === currentVideoSrc) return;
    currentVideoSrc = src;

    // Cancel in-flight preload
    loadingVideo.oncanplay = null;
    loadingVideo.onplaying = null;

    if (!src) {
      activeVideo.pause();
      activeVideo.style.opacity = '0';
      activeVideo.src = '';
      loadingVideo.pause();
      loadingVideo.style.opacity = '0';
      loadingVideo.src = '';
      _showBodyBackground();
      return;
    }

    _hideBodyBackground();

    loadingVideo.oncanplay = function () {
      loadingVideo.oncanplay = null;
      loadingVideo.onplaying = function () {
        loadingVideo.onplaying = null;
        // Wait for the first video frame to actually reach the compositor
        // before swapping opacity. rAF runs before compositing, so it can't
        // guarantee the decoded frame is ready. requestVideoFrameCallback
        // fires when a frame is presented to the compositor — the correct signal.
        if (loadingVideo.requestVideoFrameCallback) {
          loadingVideo.requestVideoFrameCallback(function () {
            finishVideoSwitch();
          });
        } else {
          // Fallback: wait 2 frames then swap
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { finishVideoSwitch(); });
          });
        }
      };
      var p = loadingVideo.play();
      if (p) p.catch(function () {});
    };
    loadingVideo.src = src;
    loadingVideo.load();
  }

  function scheduleDayPeriodCheck() {
    if (dayPeriodTimer) clearTimeout(dayPeriodTimer);
    const now = new Date();
    const next = new Date(now);
    const hour = now.getHours();
    if (hour < 6) {
      next.setHours(6, 0, 0, 0);
    } else if (hour < 18) {
      next.setHours(18, 0, 0, 0);
    } else {
      next.setDate(next.getDate() + 1);
      next.setHours(6, 0, 0, 0);
    }
    dayPeriodTimer = setTimeout(() => {
      switchWallpaperVideo(selectedTaskMode);
      scheduleDayPeriodCheck();
    }, next.getTime() - now.getTime());
  }

  function stopDayPeriodCheck() {
    if (dayPeriodTimer) {
      clearTimeout(dayPeriodTimer);
      dayPeriodTimer = null;
    }
  }

  let activeTasks = [];
  let selectedTaskId = null;
  let selectedSubtaskId = null;  // null = parent task itself is the work unit
  let expandedTaskId = null;     // which parent's subtasks are expanded in the list
  let selectedTaskMode = 'rest'; // 'rest' | 'computer' | 'reading' | 'writing'
  let currentPomodoroTaskId = null;
  let yuzuActivities = null;
  let currentYuzuActivity = null;
  let isExitingWithTask = false;
  let isPomodoroRunning = false;

  function setModeLabel(mode) {
    selectedTaskMode = mode;
    switchWallpaperVideo(mode);
  }
  setModeLabel('rest');

  // ── Yuzu parallel activity ──
  const yuzuActivityLabel = document.getElementById("yuzuActivityLabel");
  const yuzuActivityText = document.getElementById("yuzuActivityText");

  function pickYuzuActivity(mode) {
    if (!yuzuActivities) return null;
    const pool = yuzuActivities[mode] || yuzuActivities["rest"];
    if (!pool || pool.length === 0) return null;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function showYuzuActivity(activity) {
    if (!activity) return;
    currentYuzuActivity = activity;
    yuzuActivityText.textContent = "🍵 柚子正在：" + activity.doing + "...";
    yuzuActivityLabel.style.display = "";
  }

  function hideYuzuActivity() {
    clearHalfwayTimer();
    currentYuzuActivity = null;
    yuzuActivityLabel.style.display = "none";
  }

  // ── Departure overlay ──
  const departureOverlay = document.getElementById("departureOverlay");
  const departureUserLine = document.getElementById("departureUserLine");
  const departureYuzuLine = document.getElementById("departureYuzuLine");
  const departureCountdown = document.getElementById("departureCountdown");
  let departureTimer = null;

  function showDeparture(taskTitle, yuzuActivity, durationMinutes) {
    departureUserLine.textContent = "你将启程：「" + taskTitle + "」";
    if (yuzuActivity) {
      departureYuzuLine.textContent = "柚子要去：" + yuzuActivity.doing;
    } else {
      departureYuzuLine.textContent = "柚子会在旁边安静陪你。";
    }
    departureCountdown.textContent = durationMinutes + " 分钟后见";
    departureOverlay.classList.add("show");
    departureOverlay.classList.remove("fadeout");

    if (departureTimer) clearTimeout(departureTimer);
    departureTimer = setTimeout(function () {
      departureOverlay.classList.add("fadeout");
      departureTimer = setTimeout(function () {
        departureOverlay.classList.remove("show", "fadeout");
      }, 600);
    }, 3000);
  }

  // ── Halfway bubble ──
  let halfwayTimer = null;

  function scheduleHalfwayBubble(activity, durationSeconds) {
    if (halfwayTimer) clearTimeout(halfwayTimer);
    if (!activity || !activity.halfway) return;
    var halfMs = (durationSeconds * 1000) / 2;
    if (halfMs < 60000) return; // Don't bother for sessions under 1 min
    halfwayTimer = setTimeout(function () {
      showHalfwayBubble(activity);
    }, halfMs);
  }

  function showHalfwayBubble(activity) {
    if (!activity || !activity.halfway) return;
    yuzuActivityText.textContent = "💬 " + activity.halfway;
    yuzuActivityLabel.classList.add("pulse");
    setTimeout(function () {
      yuzuActivityLabel.classList.remove("pulse");
      if (currentYuzuActivity) {
        yuzuActivityText.textContent = "🍵 柚子正在：" + currentYuzuActivity.doing + "...";
      }
    }, 5000);
  }

  function clearHalfwayTimer() {
    if (halfwayTimer) {
      clearTimeout(halfwayTimer);
      halfwayTimer = null;
    }
    yuzuActivityLabel.classList.remove("pulse");
  }

  // ── Task selection ──
  const taskSelectArea = document.getElementById("taskSelectArea");
  const taskSelectList = document.getElementById("taskSelectList");
  const selectedTaskBadge = document.getElementById("selectedTaskBadge");
  const selectedTaskName = document.getElementById("selectedTaskName");

  function renderTaskSelectList() {
    taskSelectList.innerHTML = '';
    if (isPomodoroRunning || selectedTaskId) {
      taskSelectArea.style.display = 'none';
      return;
    }
    if (activeTasks.length === 0) {
      taskSelectArea.style.display = 'none';
      return;
    }
    taskSelectArea.style.display = '';
    for (const task of activeTasks) {
      const incompleteSubtasks = (task.subtasks || []).filter(s => !s.completed);
      const hasSubtasks = incompleteSubtasks.length > 0;
      const isExpanded = task.id === expandedTaskId;

      // Parent task row
      const parentItem = document.createElement('div');
      parentItem.className = 'wallpaper-task-select-item';
      const titleSpan = document.createElement('span');
      titleSpan.textContent = task.rpgTitle || task.realTitle;
      const metaSpan = document.createElement('span');
      metaSpan.className = 'wallpaper-task-select-item-meta';
      const subCount = incompleteSubtasks.length;
      const perSubMin = subCount > 0 ? Math.round((task.estimatedMinutes || 25) / subCount) : (task.estimatedMinutes || 25);
      metaSpan.textContent = (task.estimatedPomodoros || 1) + '🍅 ' + perSubMin + 'min';
      parentItem.appendChild(titleSpan);
      if (hasSubtasks) {
        const expandSpan = document.createElement('span');
        expandSpan.className = 'wallpaper-task-select-expand' + (isExpanded ? ' open' : '');
        expandSpan.textContent = '▶';
        parentItem.appendChild(expandSpan);
      }
      parentItem.appendChild(metaSpan);
      parentItem.addEventListener('click', () => {
        if (hasSubtasks) {
          expandedTaskId = isExpanded ? null : task.id;
          renderTaskSelectList();
        } else {
          selectTask(task, null);
        }
      });
      taskSelectList.appendChild(parentItem);

      // Subtask rows (if expanded)
      if (isExpanded && hasSubtasks) {
        for (const sub of incompleteSubtasks) {
          const subItem = document.createElement('div');
          subItem.className = 'wallpaper-task-select-item subtask';
          const subTitle = document.createElement('span');
          subTitle.textContent = '└ ' + (sub.rpgDesc || sub.realDesc);
          subItem.appendChild(subTitle);
          subItem.addEventListener('click', (e) => {
            e.stopPropagation();
            selectTask(task, sub);
          });
          taskSelectList.appendChild(subItem);
        }
      }
    }
  }

  async function selectTask(task, subtask) {
    selectedTaskId = task.id;
    selectedSubtaskId = subtask ? subtask.id : null;
    expandedTaskId = null;

    document.getElementById("topLeftGroup").style.display = "";

    const displayName = subtask
      ? (task.rpgTitle || task.realTitle) + ' › ' + (subtask.rpgDesc || subtask.realDesc)
      : (task.rpgTitle || task.realTitle);
    selectedTaskName.textContent = displayName;
    selectedTaskBadge.style.display = '';
    taskSelectArea.style.display = 'none';

    const modeRes = await ipc.getTaskMode(task.id);
    const mode = (modeRes.ok && modeRes.data) ? modeRes.data : 'rest';
    setModeLabel(mode);

    // Suggest per-subtask duration (editable before starting)
    const incompleteCount = (task.subtasks || []).filter(s => !s.completed).length || 1;
    const perSubMin = Math.round((task.estimatedMinutes || 25) / incompleteCount);
    pomodoroTimer.setEditableDuration(perSubMin);

    renderTaskSelectList();
  }

  function deselectTask() {
    selectedTaskId = null;
    selectedSubtaskId = null;
    expandedTaskId = null;
    selectedTaskBadge.style.display = 'none';
    hideYuzuActivity();
    document.getElementById("topLeftGroup").style.display = "none";
    setModeLabel('rest');
    pomodoroTimer.stop();
    renderTaskSelectList();
  }

  // Character
  const charRenderer = new CharacterRenderer(document.getElementById("charArea"), { mode: "wallpaper", size: 200 });
  charRenderer.mount();

  // Pomodoro helpers
  let pomodoroTickUnsub = null;
  let pomodoroEndUnsub = null;

  function clearPomodoroListeners() {
    clearHalfwayTimer();
    if (pomodoroTickUnsub) { pomodoroTickUnsub(); pomodoroTickUnsub = null; }
    if (pomodoroEndUnsub) { pomodoroEndUnsub(); pomodoroEndUnsub = null; }
  }

  async function startPomodoroFlow(durationSeconds, taskId) {
    clearPomodoroListeners();
    const durationMinutes = durationSeconds / 60;
    const res = await ipc.startPomodoro(durationMinutes, taskId);
    if (!res.ok) return;
    pomodoroTimer.start(durationSeconds);
    currentPomodoroTaskId = taskId || null;
    isPomodoroRunning = true;
    document.getElementById("changeTaskBtn").style.display = "none";
    // Pick a parallel activity for Yuzu
    if (taskId) {
      const activity = pickYuzuActivity(selectedTaskMode);
      showYuzuActivity(activity);
      scheduleHalfwayBubble(activity, durationSeconds);
      // Show departure splash
      const task = activeTasks.find(function (t) { return t.id === taskId; });
      const taskTitle = task ? (task.rpgTitle || task.realTitle) : "";
      showDeparture(taskTitle, activity, durationMinutes);
    }
    // Set mode to task's mode (or rest if no task)
    if (taskId && selectedTaskMode !== 'rest') {
      setModeLabel(selectedTaskMode);
    }
    pomodoroTickUnsub = ipc.onPomodoroTick((data) => {
      if (data.remaining >= 0) pomodoroTimer.update(data.remaining);
    });
    pomodoroEndUnsub = ipc.onPomodoroEnd(() => {
      clearPomodoroListeners();
      pomodoroTimer.stop();
      isPomodoroRunning = false;
      document.getElementById("changeTaskBtn").style.display = "";
      setModeLabel('rest');
      if (currentPomodoroTaskId) {
        showExitPanel(currentPomodoroTaskId);
      }
    });
  }

  // Pomodoro timer
  const pomodoroTimer = new PomodoroTimer(document.getElementById("pomodoroArea"), {
    onStart: () => {
      startPomodoroFlow(pomodoroTimer.getCurrentMinutes() * 60, selectedTaskId);
    },
    onPause: async () => {
      await ipc.stopPomodoro();
      clearPomodoroListeners();
      isPomodoroRunning = false;
      document.getElementById("changeTaskBtn").style.display = "";
      // Save task mode before switching to rest, so resume can restore it
      window._pausedTaskMode = selectedTaskMode;
      setModeLabel('rest');
    },
    onResume: () => {
      // Restore the task's mode before resuming
      if (window._pausedTaskMode && window._pausedTaskMode !== 'rest') {
        setModeLabel(window._pausedTaskMode);
      }
      window._pausedTaskMode = null;
      const remaining = pomodoroTimer.getRemaining();
      startPomodoroFlow(remaining, currentPomodoroTaskId);
    },
    onStop: async () => {
      await ipc.stopPomodoro();
      clearPomodoroListeners();
      isPomodoroRunning = false;
      setModeLabel('rest');
      if (currentPomodoroTaskId) {
        showExitPanel(currentPomodoroTaskId);
      }
    },
  });
  pomodoroTimer.mount();
  document.getElementById("topLeftGroup").style.display = "none";

  // Conversation sidebar
  const sidebar = document.getElementById("chatSidebar");
  const chatContent = document.getElementById("chatContent");
  const convPanel = new ConversationPanel(chatContent, {
    position: "side",
    onSend: async (text) => {
      convPanel.showTyping();
      let started = false;
      const unsubChunk = ipc.onChunk((chunk) => {
        if (!started) { started = true; convPanel.addMessage("assistant", ""); }
        const msgs = chatContent.querySelectorAll(".conv-msg--assistant");
        const last = msgs[msgs.length - 1];
        if (last) last.textContent += chunk;
      });
      const unsubDone = ipc.onDone(async (data) => {
        convPanel.hideTyping();
        unsubChunk();
        unsubDone();
        if (data.intent === INTENT.SWITCH_MODE && data.switchTarget) {
          sidebar.classList.remove("open");
          const statusRes = await ipc.getPomodoroStatus();
          if (statusRes.ok && statusRes.data.taskId) {
            showExitPanel(statusRes.data.taskId, data.switchTarget);
          } else {
            await ipc.switchMode(data.switchTarget);
          }
        }
      });
      const unsubError = ipc.onError((err) => {
        convPanel.hideTyping();
        unsubChunk();
        unsubDone();
        unsubError();
        convPanel.showError(err);
      });
      await ipc.sendMessage(text);
    },
  });
  convPanel.mount();

  // White noise
  let whiteNoise = null;
  async function initWhiteNoise() {
    if (whiteNoise) return;
    const res = await ipc.getAudioConfig();
    if (res.ok && res.data.tracks.length) {
      whiteNoise = new WhiteNoiseControl(document.getElementById("audioArea"), {
        tracks: res.data.tracks,
        volume: res.data.soundVolume ?? 0.5,
        currentTrackId: null,
        onVolumeChange: (volume) => {
          ipc.updateWallpaper({ soundVolume: volume });
        },
      });
      whiteNoise.mount();
    }
  }
  initWhiteNoise();

  // ── Change task button ──
  document.getElementById("changeTaskBtn").addEventListener("click", () => {
    if (!isPomodoroRunning) {
      deselectTask();
      currentPomodoroTaskId = null;
    }
  });

  document.getElementById("charArea").addEventListener("click", () => {
    sidebar.classList.toggle("open");
  });

  document.getElementById("chatCloseBtn").addEventListener("click", () => {
    sidebar.classList.remove("open");
  });

  // ── Exit panel logic ──
  const exitOverlay = document.getElementById("exitOverlay");
  const exitPanel = document.getElementById("exitPanel");
  const exitStateInquiry = document.getElementById("exitStateInquiry");
  const exitStateNote = document.getElementById("exitStateNote");
  const exitProgressPercentInput = document.getElementById("exitProgressPercentInput");

  function showExitPanel(taskId, targetMode) {
    isExitingWithTask = true;
    showState("inquiry");
    // Inject Yuzu's parallel progress into the exit panel
    const inquiryText = document.querySelector("#exitStateInquiry p");
    if (currentYuzuActivity && inquiryText) {
      inquiryText.textContent = "柚子刚刚" + currentYuzuActivity.done + "。你的任务呢？";
    } else if (inquiryText) {
      inquiryText.textContent = "专注时间结束了~";
    }
    exitOverlay.classList.add("open");
    exitPanel.classList.add("open");
    window._exitTaskId = taskId;
    window._exitTargetMode = targetMode || null;
  }

  async function hideExitPanelAndRefresh(toMode) {
    isExitingWithTask = false;
    isPomodoroRunning = false;
    clearPomodoroListeners();
    hideYuzuActivity();
    exitOverlay.classList.remove("open");
    exitPanel.classList.remove("open");
    setModeLabel('rest');
    pomodoroTimer.stop();

    // Reload tasks to reflect completed subtasks / tasks
    const tasksRes = await ipc.getTasks("active");
    if (tasksRes.ok) {
      activeTasks = tasksRes.data;
    }

    // Clear selection so user can pick the next subtask
    selectedTaskId = null;
    selectedSubtaskId = null;
    currentPomodoroTaskId = null;
    selectedTaskBadge.style.display = 'none';
    const targetMode = toMode || window._exitTargetMode;
    window._exitTaskId = null;
    window._exitTargetMode = null;

    if (targetMode) {
      await ipc.switchMode(targetMode);
      return;
    }

    renderTaskSelectList();
  }

  function showState(name) {
    exitStateInquiry.style.display = name === "inquiry" ? "" : "none";
    exitStateNote.style.display = name === "note" ? "" : "none";
  }

  // "完成了" — toggle current subtask, check if parent is fully done
  document.getElementById("exitCompletedBtn").addEventListener("click", async () => {
    const taskId = window._exitTaskId;
    if (!taskId) { await hideExitPanelAndRefresh(); return; }

    // Toggle the current subtask (or the parent itself if no subtask selected)
    if (selectedSubtaskId) {
      await ipc.toggleSubtask(taskId, selectedSubtaskId);
    }

    // Reload task to check completion state
    const res = await ipc.getTaskById(taskId);
    if (res.ok && res.data) {
      const allDone = (res.data.subtasks || []).every(s => s.completed);
      if (allDone) await ipc.completeTask(taskId);
    }

    // Always back to pet mode after completing
    await hideExitPanelAndRefresh(MODE.PET);
  });

  // "还没完成" — record progress percentage
  document.getElementById("exitNotYetBtn").addEventListener("click", async () => {
    const taskId = window._exitTaskId;
    if (taskId) {
      const res = await ipc.getTaskById(taskId);
      if (res.ok && res.data) {
        let prev = 0;
        if (selectedSubtaskId) {
          const sub = (res.data.subtasks || []).find(s => s.id === selectedSubtaskId);
          prev = sub ? (sub.cumulativeProgress || 0) : 0;
        } else {
          prev = res.data.cumulativeProgress || 0;
        }
        exitProgressPercentInput.min = prev;
        exitProgressPercentInput.value = prev;
      }
    }
    showState("note");
  });

  // "再延 25 分钟" — extend pomodoro
  document.getElementById("exitExtendBtn").addEventListener("click", async () => {
    const taskId = window._exitTaskId;
    isExitingWithTask = false;
    exitOverlay.classList.remove("open");
    exitPanel.classList.remove("open");
    window._exitTaskId = null;
    await startPomodoroFlow(25 * 60, taskId);
  });

  // Progress save — clamped to never go below previous
  document.getElementById("exitProgressSaveBtn").addEventListener("click", async () => {
    const percent = parseInt(exitProgressPercentInput.value, 10) || 0;
    const clampedPercent = Math.min(100, Math.max(0, percent));
    const taskId = window._exitTaskId;
    if (taskId) {
      await ipc.updateTaskProgress(taskId, clampedPercent, null, selectedSubtaskId);
    }
    await hideExitPanelAndRefresh(MODE.PET);
  });

  exitOverlay.addEventListener("click", () => hideExitPanelAndRefresh());

  // ── Keyboard ──
  document.addEventListener("keydown", async (e) => {
    if (e.key === "Escape") {
      if (isExitingWithTask) {
        await hideExitPanelAndRefresh();
        return;
      }
      if (sidebar.classList.contains("open")) {
        sidebar.classList.remove("open");
        return;
      }
      if (currentPomodoroTaskId) {
        showExitPanel(currentPomodoroTaskId);
      } else {
        await ipc.switchMode(MODE.PET);
      }
    }
  });

  // ── Init: load tasks and decide initial state ──
  async function initWallpaper() {
    if (!yuzuActivities) {
      const res = await ipc.getYuzuActivities();
      if (res.ok && res.data) yuzuActivities = res.data;
    }
    const tasksRes = await ipc.getTasks("active");
    if (tasksRes.ok && tasksRes.data.length > 0) {
      activeTasks = tasksRes.data;
      if (!isPomodoroRunning) {
        renderTaskSelectList();
      }
    } else {
      activeTasks = [];
      if (!isPomodoroRunning) {
        taskSelectArea.style.display = 'none';
        selectedTaskBadge.style.display = 'none';
        selectedTaskId = null;
        setModeLabel('rest');
      }
    }
  }

  // Re-load tasks whenever wallpaper mode is activated (user switches back)
  ipc.onModeActivated((data) => {
    if (data.mode === MODE.WALLPAPER) {
      initWallpaper();
      initWhiteNoise();
      scheduleDayPeriodCheck();
    }
  });

  // Stop audio and day-period watcher when leaving wallpaper mode
  ipc.onModeDeactivated(() => {
    stopDayPeriodCheck();
    if (whiteNoise) {
      whiteNoise.destroy();
      whiteNoise = null;
    }
  });

  initWallpaper();
  scheduleDayPeriodCheck();
})();
</script>

<!-- WebGL default shader sources (embedded for synchronous access) -->
<script type="x-shader/x-vertex" id="shader-default-vert">
#version 300 es
precision highp float;
in vec2 aPos; in vec2 aTexCoord;
uniform mat3 uViewProj; uniform vec2 uPosition; uniform vec2 uScale; uniform float uRotation;
out vec2 vTexCoord;
void main() {
    float c = cos(uRotation); float s = sin(uRotation);
    vec2 rotated = vec2(aPos.x * c - aPos.y * s, aPos.x * s + aPos.y * c);
    vec2 scaled = rotated * uScale;
    vec2 worldPos = scaled + uPosition;
    vec3 clip = uViewProj * vec3(worldPos, 1.0);
    gl_Position = vec4(clip.xy, 0.0, 1.0);
    vTexCoord = aTexCoord;
}
</script>
<script type="x-shader/x-fragment" id="shader-default-frag">
#version 300 es
precision highp float;
in vec2 vTexCoord; out vec4 outColor;
uniform sampler2D uMainTex; uniform vec4 uColorFilter; uniform float uAlpha;
void main() {
    vec4 texColor = texture(uMainTex, vTexCoord);
    outColor = texColor * uColorFilter * vec4(1.0, 1.0, 1.0, uAlpha);
}
</script>

<!-- WebGL wallpaper renderer initialization -->
<script>
(() => {
    let renderer = null;

    async function initWebGL() {
        const canvas = document.getElementById("webglCanvas");
        if (!canvas) return;

        try {
            renderer = new window.WebGLWallpaperRenderer(canvas);
        } catch (err) {
            console.error("WebGL init failed:", err);
            return;
        }

        const vertEl = document.getElementById("shader-default-vert");
        const fragEl = document.getElementById("shader-default-frag");
        if (!vertEl || !fragEl) {
            console.error("Shader source elements not found");
            return;
        }
        renderer.registerShader("default", vertEl.textContent, fragEl.textContent);
        var gl = renderer.gl;
        gl._defaultShader = renderer.shaderManager.get("default");

        // Make body transparent so WebGL canvas shows through
        document.body.style.backgroundImage = "none";
        document.body.style.backgroundColor = "transparent";

        renderer.start();
    }

        // arg can be: (string) WE wallpaper dir name, (object) direct scene data, or (null) to clear
    async function applyWeWallpaperWebGL(arg) {
        if (!renderer) return;

        if (!arg) {
            // Clear scene
            var children = renderer._rootNode.children.slice();
            children.forEach(function (c) { c.destroy(); });
            renderer._rootNode.children = [];
            return;
        }

        var sceneData;

        if (typeof arg === "string") {
            // WE wallpaper dir name — load via IPC
            var ipc = new window.IpcClient();
            var res = await ipc.loadWeWallpaper(arg);
            if (!res.ok || !res.data) return;
            var layers = res.data.layers || [];
            var sceneChildren = [];
            layers.forEach(function (lyr, i) {
                // WE uses CSS coords (y=0 at TOP). WebGL uses OpenGL (y=0 at BOTTOM).
                sceneChildren.push({
                    type: "Layer",
                    name: lyr.name || ("layer_" + i),
                    position: [lyr.x, 2160 - lyr.y],
                    alpha: lyr.alpha !== undefined ? lyr.alpha : 1,
                    zIndex: i + 1,
                    texture: lyr.url,
                    width: lyr.width,
                    height: lyr.height,
                    anchor: [0.5, 0.5],
                });
            });
            sceneData = {
                camera: { x: 1920, y: 1080, width: 3840, height: 2160 },
                children: sceneChildren,
            };
        } else if (typeof arg === "object") {
            // Direct scene data from editor
            sceneData = arg;
            // Flip Y in all child positions if they come from WE data
            if (sceneData.children) {
                sceneData.children.forEach(function (c) {
                    if (c.position && c._weYFlip !== false) {
                        c.position[1] = 2160 - c.position[1];
                        c._weYFlip = true;
                    }
                });
            }
        } else {
            return;
        }

        await renderer.loadScene(sceneData);
    }

    document.addEventListener("DOMContentLoaded", async function () {
        await initWebGL();
    });

    window._webglApplyWeWallpaper = applyWeWallpaperWebGL;

    window._onEditorSceneApplied = function(sceneData) {
        if (renderer && sceneData) {
            applyWeWallpaperWebGL(sceneData);
        }
    };

})();
</script>
