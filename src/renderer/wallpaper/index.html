<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壁纸模式 — 露娜·月语</title>
<link rel="stylesheet" href="../shared/styles/base.css">
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: url('../../../assets/backgrounds/we_main.png') center/cover no-repeat, linear-gradient(135deg, var(--color-bg-darkest), var(--color-bg-dark));
    overflow: hidden;
    position: relative;
  }

  .we-layers {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .we-layer {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
  }

  .wallpaper-bg-layer {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(107,92,231,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .wallpaper-char-area {
    width: var(--char-wallpaper-size);
    height: var(--char-wallpaper-size);
    margin-bottom: var(--space-xl);
    cursor: pointer;
  }

  .wallpaper-pomodoro-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }

  .wallpaper-chat-sidebar {
    position: fixed;
    right: 0;
    top: 0;
    width: 320px;
    height: 100%;
    background: var(--color-bg-dark);
    border-left: 1px solid var(--color-bg-light);
    transform: translateX(100%);
    transition: transform var(--transition-normal);
    z-index: 20;
    display: flex;
    flex-direction: column;
  }

  .wallpaper-chat-sidebar.open {
    transform: translateX(0);
  }

  .wallpaper-chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-md);
    border-bottom: 1px solid var(--color-bg-light);
  }

  .wallpaper-chat-header span {
    font-size: var(--font-lg);
    color: var(--color-text-primary);
  }

  .wallpaper-chat-close {
    background: none;
    border: none;
    color: var(--color-text-muted);
    cursor: pointer;
    font-size: var(--font-xl);
  }

  .wallpaper-chat-content {
    flex: 1;
    overflow: hidden;
  }


  .wallpaper-we-selector {
    display: none;
    margin-top: var(--space-sm);
    gap: var(--space-sm);
    align-items: center;
  }
  .wallpaper-we-selector.visible {
    display: flex;
  }
  .wallpaper-we-selector label {
    font-size: var(--font-xs);
    color: var(--color-text-muted);
    white-space: nowrap;
  }
  .wallpaper-we-selector select {
    background: var(--color-bg-medium);
    color: var(--color-text-primary);
    border: 1px solid var(--color-bg-light);
    border-radius: var(--radius-sm);
    padding: var(--space-xs) var(--space-sm);
    font-size: var(--font-sm);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }

  .wallpaper-esc-hint {
    position: fixed;
    bottom: var(--space-md);
    left: 50%;
    transform: translateX(-50%);
    font-size: var(--font-xs);
    color: var(--color-text-muted);
    opacity: 0.5;
  }

  .wallpaper-exit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 45;
  }
  .wallpaper-exit-overlay.open { display: block; }

  .wallpaper-exit-panel {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--color-bg-dark);
    border: 1px solid var(--color-bg-light);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    box-shadow: var(--shadow-lg);
    z-index: 50;
    max-width: 360px;
    width: 90%;
    text-align: center;
  }
  .wallpaper-exit-panel.open { display: block; }

  .wallpaper-exit-panel p {
    color: var(--color-text-primary);
    font-size: var(--font-base);
    margin: 0 0 var(--space-md);
  }

  .wallpaper-exit-panel button {
    margin: var(--space-xs);
    padding: var(--space-sm) var(--space-md);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: var(--font-sm);
  }
  .wallpaper-exit-btn-primary {
    background: var(--color-primary);
    color: #fff;
  }
  .wallpaper-exit-btn-secondary {
    background: var(--color-bg-light);
    color: var(--color-text-primary);
  }

  .wallpaper-exit-subtask-list {
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
    margin: var(--space-sm) 0;
  }
  .wallpaper-exit-subtask-item {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-xs) 0;
    font-size: var(--font-sm);
    color: var(--color-text-secondary);
  }

  .wallpaper-exit-textarea {
    width: 100%;
    height: 80px;
    background: var(--color-bg-medium);
    border: 1px solid var(--color-bg-light);
    border-radius: var(--radius-sm);
    color: var(--color-text-primary);
    padding: var(--space-sm);
    font-size: var(--font-sm);
    resize: none;
    margin: var(--space-sm) 0;
    box-sizing: border-box;
  }
</style>
</head>
<body>

<canvas id="webglCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:-1;"></canvas>

<div class="wallpaper-bg-layer"></div>

<div class="we-layers" id="weLayers"></div>
<div class="wallpaper-char-area" id="charArea" title="点击露娜打开对话"></div>

<div class="wallpaper-pomodoro-area" id="pomodoroArea"></div>

<div id="audioArea"></div>

<div class="wallpaper-we-selector" id="weSelector">
  <label>壁纸</label>
  <select id="weSelect"></select>
</div>

<div class="wallpaper-chat-sidebar" id="chatSidebar">
  <div class="wallpaper-chat-header">
    <span>露娜·月语</span>
    <button class="wallpaper-chat-close" id="chatCloseBtn">×</button>
  </div>
  <div class="wallpaper-chat-content" id="chatContent"></div>
</div>

<div class="wallpaper-esc-hint">按 ESC 退出壁纸模式</div>

<div class="wallpaper-exit-overlay" id="exitOverlay"></div>
<div class="wallpaper-exit-panel" id="exitPanel">
  <!-- State 1: initial inquiry -->
  <div id="exitStateInquiry">
    <p>专注时间结束了，旅者完成了目标吗？</p>
    <button class="wallpaper-exit-btn-primary" id="exitCompletedBtn">完成了</button>
    <button class="wallpaper-exit-btn-secondary" id="exitNotYetBtn">还没</button>
  </div>
  <!-- State 2: subtask checklist -->
  <div id="exitStateSubtasks" style="display:none">
    <p>勾选已完成的子任务：</p>
    <div class="wallpaper-exit-subtask-list" id="exitSubtaskList"></div>
    <button class="wallpaper-exit-btn-primary" id="exitSubtaskConfirmBtn">确认返回</button>
  </div>
  <!-- State 3: extend confirmation -->
  <div id="exitStateExtend" style="display:none">
    <p>要再延 25 分钟继续吗？</p>
    <button class="wallpaper-exit-btn-primary" id="exitExtendYesBtn">是，继续专注</button>
    <button class="wallpaper-exit-btn-secondary" id="exitExtendNoBtn">否，记录进度</button>
  </div>
  <!-- State 4: progress note -->
  <div id="exitStateNote" style="display:none">
    <p>记录一下进度吧~</p>
    <textarea class="wallpaper-exit-textarea" id="exitProgressInput" placeholder="输入你的进度..."></textarea>
    <button class="wallpaper-exit-btn-primary" id="exitProgressSaveBtn">保存并返回</button>
  </div>
</div>

<script src="../../shared/constants.js"></script>
<script src="../shared/ipc-client.js"></script>
<script src="../shared/dom-utils.js"></script>
<script src="../shared/character-renderer.js"></script>
<script src="../shared/conversation-panel.js"></script>
<script src="../shared/pomodoro-timer.js"></script>
<script src="../shared/white-noise-control.js"></script>
<script src="../shared/webgl/math.js"></script>
<script src="../shared/webgl/shader-manager.js"></script>
<script src="../shared/webgl/texture-manager.js"></script>
<script src="../shared/webgl/mesh.js"></script>
<script src="../shared/webgl/framebuffer.js"></script>
<script src="../shared/webgl/camera.js"></script>
<script src="../shared/webgl/scene-graph.js"></script>
<script src="../shared/webgl/render-pipeline.js"></script>
<script src="../shared/webgl/renderer.js"></script>
<script>
(() => {
  const { IpcClient, CharacterRenderer, ConversationPanel, PomodoroTimer, WhiteNoiseControl } = window;
  const { INTENT, MODE } = window;
  const ipc = new IpcClient();
  let currentPomodoroTaskId = null;
  let isExitingWithTask = false;

  // Character
  const charRenderer = new CharacterRenderer(document.getElementById("charArea"), { mode: "wallpaper", size: 200 });
  charRenderer.mount();

  // Pomodoro helpers
  let pomodoroTickUnsub = null;
  let pomodoroEndUnsub = null;

  function clearPomodoroListeners() {
    if (pomodoroTickUnsub) { pomodoroTickUnsub(); pomodoroTickUnsub = null; }
    if (pomodoroEndUnsub) { pomodoroEndUnsub(); pomodoroEndUnsub = null; }
  }

  async function startPomodoroFlow(durationSeconds, taskId) {
    clearPomodoroListeners();
    const durationMinutes = durationSeconds / 60;
    const res = await ipc.startPomodoro(durationMinutes, taskId);
    if (!res.ok) return;
    pomodoroTimer.start(durationSeconds);
    currentPomodoroTaskId = taskId || null;
    pomodoroTickUnsub = ipc.onPomodoroTick((data) => {
      if (data.remaining >= 0) pomodoroTimer.update(data.remaining);
    });
    pomodoroEndUnsub = ipc.onPomodoroEnd(() => {
      clearPomodoroListeners();
      pomodoroTimer.stop();
    });
  }

  // Pomodoro timer
  const pomodoroTimer = new PomodoroTimer(document.getElementById("pomodoroArea"), {
    onStart: () => startPomodoroFlow(25 * 60, currentPomodoroTaskId),
    onPause: async () => {
      await ipc.stopPomodoro();
      clearPomodoroListeners();
    },
    onResume: () => {
      const remaining = pomodoroTimer.getRemaining();
      startPomodoroFlow(remaining, currentPomodoroTaskId);
    },
    onStop: async () => {
      await ipc.stopPomodoro();
      clearPomodoroListeners();
      currentPomodoroTaskId = null;
      pomodoroTimer.stop();
    },
  });
  pomodoroTimer.mount();

  // Conversation sidebar
  const sidebar = document.getElementById("chatSidebar");
  const chatContent = document.getElementById("chatContent");
  const convPanel = new ConversationPanel(chatContent, {
    position: "side",
    onSend: async (text) => {
      convPanel.showTyping();
      let started = false;
      const unsubChunk = ipc.onChunk((chunk) => {
        if (!started) { started = true; convPanel.addMessage("assistant", ""); }
        const msgs = chatContent.querySelectorAll(".conv-msg--assistant");
        const last = msgs[msgs.length - 1];
        if (last) last.textContent += chunk;
      });
      const unsubDone = ipc.onDone(async (data) => {
        convPanel.hideTyping();
        unsubChunk();
        unsubDone();
        if (data.intent === INTENT.SWITCH_MODE && data.switchTarget) {
          sidebar.classList.remove("open");
          const statusRes = await ipc.getPomodoroStatus();
          if (statusRes.ok && statusRes.data.taskId) {
            showExitPanel(statusRes.data.taskId);
          } else {
            await ipc.switchMode(data.switchTarget);
          }
        }
      });
      const unsubError = ipc.onError((err) => {
        convPanel.hideTyping();
        unsubChunk();
        unsubDone();
        unsubError();
        convPanel.showError(err);
      });
      await ipc.sendMessage(text);
    },
  });
  convPanel.mount();

  // White noise
  let whiteNoise = null;
  ipc.getAudioConfig().then((res) => {
    if (res.ok && res.data.tracks.length) {
      whiteNoise = new WhiteNoiseControl(document.getElementById("audioArea"), {
        tracks: res.data.tracks,
        volume: res.data.soundVolume ?? 0.5,
        currentTrackId: null,
        onVolumeChange: (volume) => {
          ipc.updateWallpaper({ soundVolume: volume });
        },
      });
      whiteNoise.mount();
    }
  });

  // ── Wallpaper Engine integration ──
  const weSelector = document.getElementById("weSelector");
  const weSelect = document.getElementById("weSelect");
  let currentWeDir = null;

  async function loadWeWallpapers() {
    const listRes = await ipc.listWeWallpapers();
    if (!listRes.ok || !listRes.data.length) return;

    // Populate dropdown
    weSelect.innerHTML = '<option value="">默认背景</option>';
    for (const wp of listRes.data) {
      const opt = document.createElement("option");
      opt.value = wp.dirName;
      opt.textContent = wp.title || wp.dirName;
      weSelect.appendChild(opt);
    }
    weSelector.classList.add("visible");

    // Load saved choice
    const settingsRes = await ipc.getWallpaper();
    const savedWe = settingsRes.ok ? settingsRes.data?.weWallpaperDir : null;
    if (savedWe) {
      weSelect.value = savedWe;
      applyWeWallpaper(savedWe);
    }
  }

  async function applyWeWallpaper(dirName) {
    const layersContainer = document.getElementById("weLayers");
    layersContainer.innerHTML = "";

    if (!dirName) {
      document.body.style.backgroundImage = "";
      currentWeDir = null;
      return;
    }

    const res = await ipc.loadWeWallpaper(dirName);
    if (!res.ok || !res.data?.layers?.length) return;

    document.body.style.backgroundImage = "";

    const layers = res.data.layers;

    // Sort: backgrounds (unnamed) first by size, then positioned by y-coordinate
    const sorted = [...layers].sort((a, b) => {
      const aIsBg = !a.name;
      const bIsBg = !b.name;
      if (aIsBg && !bIsBg) return -1;
      if (!aIsBg && bIsBg) return 1;
      if (aIsBg) return (b.width * b.height) - (a.width * a.height);
      return a.y - b.y;
    });

    let z = 1;
    for (const layer of sorted) {
      const div = document.createElement("div");
      div.className = "we-layer";

      if (!layer.name) {
        // Background layer — fill screen
        div.style.cssText = `background-image:url('${layer.url}');background-size:cover;background-position:center;z-index:${z};`;
      } else {
        // Positioned layer — map 4K coordinate space (3840x2160) → viewport %
        const leftPct = (layer.x / 3840) * 100;
        const topPct = (layer.y / 2160) * 100;
        const wPct = (layer.width / 3840) * 100;
        const hPct = (layer.height / 2160) * 100;
        div.style.cssText = [
          `background-image:url('${layer.url}')`,
          `background-size:100% 100%`,
          `background-repeat:no-repeat`,
          `position:absolute`,
          `left:${leftPct.toFixed(2)}%`,
          `top:${topPct.toFixed(2)}%`,
          `transform:translate(-50%,-50%)`,
          `width:${wPct.toFixed(2)}vw`,
          `height:${hPct.toFixed(2)}vh`,
          `opacity:${layer.alpha}`,
          `z-index:${z}`,
        ].join(";");
      }

      layersContainer.appendChild(div);
      z++;
    }

    currentWeDir = dirName;
  }

  weSelect.addEventListener("change", () => {
    const dirName = weSelect.value;
    applyWeWallpaper(dirName || null);
    ipc.updateWallpaper({ weWallpaperDir: dirName || null });
  });

  loadWeWallpapers();

  document.getElementById("charArea").addEventListener("click", () => {
    sidebar.classList.toggle("open");
  });

  document.getElementById("chatCloseBtn").addEventListener("click", () => {
    sidebar.classList.remove("open");
  });

  // ── Exit panel logic ──
  const exitOverlay = document.getElementById("exitOverlay");
  const exitPanel = document.getElementById("exitPanel");
  const exitStateInquiry = document.getElementById("exitStateInquiry");
  const exitStateSubtasks = document.getElementById("exitStateSubtasks");
  const exitStateExtend = document.getElementById("exitStateExtend");
  const exitStateNote = document.getElementById("exitStateNote");
  const exitSubtaskList = document.getElementById("exitSubtaskList");
  const exitProgressInput = document.getElementById("exitProgressInput");

  function showExitPanel(taskId) {
    isExitingWithTask = true;
    showState("inquiry");
    exitOverlay.classList.add("open");
    exitPanel.classList.add("open");
    window._exitTaskId = taskId;
  }

  function hideExitPanel() {
    isExitingWithTask = false;
    exitOverlay.classList.remove("open");
    exitPanel.classList.remove("open");
    window._exitTaskId = null;
  }

  function showState(name) {
    exitStateInquiry.style.display = name === "inquiry" ? "" : "none";
    exitStateSubtasks.style.display = name === "subtasks" ? "" : "none";
    exitStateExtend.style.display = name === "extend" ? "" : "none";
    exitStateNote.style.display = name === "note" ? "" : "none";
  }

  document.getElementById("exitCompletedBtn").addEventListener("click", async () => {
    const taskId = window._exitTaskId;
    if (!taskId) return;
    const res = await ipc.getTaskById(taskId);
    if (!res.ok || !res.data) { hideExitPanel(); await ipc.switchMode(MODE.PET); return; }
    const task = res.data;
    exitSubtaskList.innerHTML = "";
    for (const sub of (task.subtasks || [])) {
      const row = document.createElement("div");
      row.className = "wallpaper-exit-subtask-item";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = sub.completed;
      cb.addEventListener("change", () => ipc.toggleSubtask(taskId, sub.id));
      row.appendChild(cb);
      row.appendChild(document.createTextNode(sub.rpgDesc || sub.realDesc));
      exitSubtaskList.appendChild(row);
    }
    showState("subtasks");
  });

  document.getElementById("exitSubtaskConfirmBtn").addEventListener("click", async () => {
    const taskId = window._exitTaskId;
    if (taskId) {
      const res = await ipc.getTaskById(taskId);
      if (res.ok && res.data) {
        const allDone = (res.data.subtasks || []).every((s) => s.completed);
        if (allDone) await ipc.completeTask(taskId);
      }
    }
    hideExitPanel();
    await ipc.switchMode(MODE.PET);
  });

  document.getElementById("exitNotYetBtn").addEventListener("click", () => {
    showState("extend");
  });

  document.getElementById("exitExtendYesBtn").addEventListener("click", async () => {
    hideExitPanel();
    await startPomodoroFlow(25 * 60, window._exitTaskId);
  });

  document.getElementById("exitExtendNoBtn").addEventListener("click", () => {
    showState("note");
  });

  document.getElementById("exitProgressSaveBtn").addEventListener("click", async () => {
    const note = exitProgressInput.value.trim();
    exitProgressInput.value = "";
    hideExitPanel();
    if (note) {
      convPanel.addMessage("user", note);
      await ipc.sendMessage(note);
    }
    await ipc.switchMode(MODE.PET);
  });

  exitOverlay.addEventListener("click", () => hideExitPanel());

  // ── Keyboard ──
  document.addEventListener("keydown", async (e) => {
    if (e.key === "Escape") {
      if (isExitingWithTask) {
        hideExitPanel();
        return;
      }
      if (sidebar.classList.contains("open")) {
        sidebar.classList.remove("open");
        return;
      }
      const statusRes = await ipc.getPomodoroStatus();
      if (statusRes.ok && statusRes.data.taskId) {
        showExitPanel(statusRes.data.taskId);
      } else {
        await ipc.switchMode(MODE.PET);
      }
    }
  });
})();
</script>

<!-- WebGL default shader sources (embedded for synchronous access) -->
<script type="x-shader/x-vertex" id="shader-default-vert">
#version 300 es
precision highp float;
in vec2 aPos; in vec2 aTexCoord;
uniform mat3 uViewProj; uniform vec2 uPosition; uniform vec2 uScale; uniform float uRotation;
out vec2 vTexCoord;
void main() {
    float c = cos(uRotation); float s = sin(uRotation);
    vec2 rotated = vec2(aPos.x * c - aPos.y * s, aPos.x * s + aPos.y * c);
    vec2 scaled = rotated * uScale;
    vec2 worldPos = scaled + uPosition;
    vec3 clip = uViewProj * vec3(worldPos, 1.0);
    gl_Position = vec4(clip.xy, 0.0, 1.0);
    vTexCoord = aTexCoord;
}
</script>
<script type="x-shader/x-fragment" id="shader-default-frag">
#version 300 es
precision highp float;
in vec2 vTexCoord; out vec4 outColor;
uniform sampler2D uMainTex; uniform vec4 uColorFilter; uniform float uAlpha;
void main() {
    vec4 texColor = texture(uMainTex, vTexCoord);
    outColor = texColor * uColorFilter * vec4(1.0, 1.0, 1.0, uAlpha);
}
</script>

<!-- WebGL wallpaper renderer initialization -->
<script>
(() => {
    let renderer = null;

    async function initWebGL() {
        const canvas = document.getElementById("webglCanvas");
        if (!canvas) return;

        try {
            renderer = new window.WebGLWallpaperRenderer(canvas);
        } catch (err) {
            console.error("WebGL init failed:", err);
            return;
        }

        // Register default shader from embedded script elements
        const vertEl = document.getElementById("shader-default-vert");
        const fragEl = document.getElementById("shader-default-frag");
        if (!vertEl || !fragEl) {
            console.error("Shader source elements not found");
            return;
        }
        renderer.registerShader("default", vertEl.textContent, fragEl.textContent);

        // Pre-compile and attach to the GL context for LayerNode.render access
        const gl = renderer.gl;
        gl._defaultShader = renderer.shaderManager.get("default");

        // Hide CSS-based layer rendering — WebGL canvas replaces it
        const weLayers = document.getElementById("weLayers");
        if (weLayers) {
            weLayers.style.display = "none";
        }

        renderer.start();
    }

    async function applyWeWallpaper(dirName) {
        if (!renderer) return;

        if (!dirName) {
            // Clear scene
            const children = renderer._rootNode.children.slice();
            children.forEach(function (c) { c.destroy(); });
            renderer._rootNode.children = [];
            return;
        }

        const ipc = new window.IpcClient();
        const res = await ipc.loadWeWallpaper(dirName);
        if (!res.ok || !res.data) return;

        const data = res.data;
        const layers = data.layers || [];

        // Build scene graph from WE layer data
        const children = [];
        layers.forEach(function (lyr, i) {
            if (!lyr.name) {
                // Background layer (unnamed) — fill entire scene
                children.push({
                    type: "Layer",
                    name: "layer_" + i,
                    position: [1920, 1080],
                    alpha: lyr.alpha !== undefined ? lyr.alpha : 1,
                    zIndex: i + 1,
                    texture: lyr.url,
                    width: lyr.width || 3840,
                    height: lyr.height || 2160,
                    anchor: [0.5, 0.5],
                });
            } else {
                // Positioned layer — use WE coordinate system
                children.push({
                    type: "Layer",
                    name: lyr.name,
                    position: [lyr.x, lyr.y],
                    alpha: lyr.alpha,
                    zIndex: i + 1,
                    texture: lyr.url,
                    width: lyr.width,
                    height: lyr.height,
                    anchor: [0.5, 0.5],
                });
            }
        });

        await renderer.loadScene({
            camera: { x: 1920, y: 1080, width: 3840, height: 2160 },
            children: children,
        });
    }

    // Initialize on DOM ready
    document.addEventListener("DOMContentLoaded", async function () {
        await initWebGL();

        // Restore current WE wallpaper setting
        const ipc = new window.IpcClient();
        const state = await ipc.getAppState();
        if (state.ok && state.data && state.data.wallpaperSettings && state.data.wallpaperSettings.weWallpaperDir) {
            applyWeWallpaper(state.data.wallpaperSettings.weWallpaperDir);
        }

        // Hook the WE wallpaper selector dropdown to drive WebGL rendering too
        const weSelect = document.getElementById("weSelect");
        if (weSelect) {
            weSelect.addEventListener("change", function () {
                const dirName = this.value;
                applyWeWallpaper(dirName || null);
            });
        }
    });
})();
</script>
</body>
</html>
